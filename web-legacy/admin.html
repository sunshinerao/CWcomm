<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CWcomm Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>CWcomm 管理端</h1>
        <p>活动管理 + 频道配置 + MIC 采集 + 启动</p>
      </header>

      <section class="panel">
        <h2>1. 选择活动或创建活动</h2>
        <div class="status-row">
          <button id="refresh-events" type="button" class="status-btn">刷新活动</button>
        </div>
        <label>
          已有活动
          <select id="event-select"></select>
        </label>

        <form id="create-event-form">
          <label>
            新活动名称
            <input id="event-name" placeholder="Climate Forum Session A" required />
          </label>
          <button type="submit">创建活动</button>
        </form>
      </section>

      <section class="panel">
        <h2>入会链接与扫码</h2>
        <label>
          客户端入口地址
          <input id="client-entry-url" />
        </label>
        <div id="join-link-text"></div>
        <img id="join-qr" alt="join-qr" />
      </section>

      <section class="panel">
        <h2>2. 设置中英频道</h2>
        <label class="inline-check">
          <input id="ch-zh-en" type="checkbox" checked />
          中文 -> 英文
        </label>
        <label class="inline-check">
          <input id="ch-en-zh" type="checkbox" />
          英文 -> 中文
        </label>
      </section>

      <section class="panel">
        <h2>3. 推送预置 Hello 字幕</h2>
        <div class="status-row">
          <button id="push-hello" type="button" class="status-btn">推送 Hello</button>
        </div>
      </section>

      <section class="panel">
        <h2>4. 打开拾音设备（MIC）</h2>
        <div class="status-row">
          <button id="refresh-mics" type="button" class="status-btn">刷新设备</button>
        </div>
        <label>
          输入设备
          <select id="mic-select"></select>
        </label>
        <div id="mic-status">MIC 状态：未打开</div>
      </section>

      <section class="panel">
        <h2>5. 创建（开始）</h2>
        <div class="status-row">
          <button id="start-session" type="button" class="status-btn">创建（开始）</button>
          <button id="stop-session" type="button" class="status-btn">停止</button>
        </div>
        <div id="run-status">运行状态：未启动</div>
      </section>

      <section class="panel">
        <h2>监听监视输出</h2>
        <label>
          监视语言
          <select id="monitor-language">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
          </select>
        </label>
        <div class="status-row">
          <button id="monitor-connect" type="button" class="status-btn">开始监视</button>
          <button id="monitor-disconnect" type="button" class="status-btn">停止监视</button>
        </div>
        <div id="monitor-status">监视状态：未连接</div>
        <div class="list">
          <div class="item metric-card">
            <strong>ASR耗时</strong>
            <small id="metric-asr" class="metric-value">-</small>
            <canvas id="trend-asr" width="260" height="56"></canvas>
          </div>
          <div class="item metric-card">
            <strong>翻译耗时</strong>
            <small id="metric-translation" class="metric-value">-</small>
            <canvas id="trend-translation" width="260" height="56"></canvas>
          </div>
          <div class="item metric-card">
            <strong>TTS耗时</strong>
            <small id="metric-tts" class="metric-value">-</small>
            <canvas id="trend-tts" width="260" height="56"></canvas>
          </div>
          <div class="item metric-card">
            <strong>端到端延迟</strong>
            <small id="metric-e2e" class="metric-value">-</small>
            <canvas id="trend-e2e" width="260" height="56"></canvas>
          </div>
          <div class="item metric-card">
            <strong>客户端连接数</strong>
            <small id="metric-clients" class="metric-value">0</small>
            <canvas id="trend-clients" width="260" height="56"></canvas>
          </div>
        </div>
        <div id="monitor-output" class="subtitle-output"></div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
