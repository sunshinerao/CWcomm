version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cwcomm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cwcomm
      POSTGRES_PASSWORD: cwcomm
      POSTGRES_DB: cwcomm
    ports:
      - "5432:5432"
    volumes:
      - cwcomm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cwcomm -d cwcomm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cwcomm_pg_data:
